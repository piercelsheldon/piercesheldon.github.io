<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #1e1e1e; }
        .navbar { background-color: #1f3a5f; padding: 10px; text-align: center; }
        .navbar button { background-color: #ffffff; border: none; padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .navbar button:hover { background-color: #dbeafe; }
        .container { max-width: 800px; margin: auto; padding: 20px; background-color: white; border-radius: 10px; margin-top: 20px; }
        h1, h2 { text-align: center; margin: 5px; }
        
        /* Form Styling */
        .contact-container { margin-top: 30px; }
        .hidden { display: none; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        .input-group input, .input-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .submit-btn { background-color: #1f3a5f; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .submit-btn:hover { background-color: #2f5d3a; }
        
        .footer { text-align: center; margin: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
        <button onclick="location.href='index.html'">Home</button>
        <button onclick="location.href='cover.html'">Cover</button>
        <button onclick="location.href='resume.html'">Resume</button>
        <button onclick="location.href='contact.html'">Contact</button>
        <button onclick="location.href='hobby.html'">Hobbies</button>
    </div>

    <div class="container">
        <h1>Contact Pierce Lee Sheldon</h1>
        <p style="text-align: center;">Please use the form below to reach out. I will get back to you as soon as possible!</p>

        <div class="contact-container">
            <form action="https://formspree.io/f/mrerogbw" method="POST">
                <!-- Honeypot -->
                <div class="hidden">
                    <input type="text" name="_gotcha">
                </div>

                <div class="input-group">
                    <label>Name</label>
                    <input type="text" name="name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>

                <div class="input-group">
                    <label>Message</label>
                    <textarea name="message" rows="6" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>

    <div class="footer">
        <button onclick="location.href='index.html'">Home</button>
        <button onclick="location.href='resume.html'">Resume</button>
    </div>
</body>
</html>
